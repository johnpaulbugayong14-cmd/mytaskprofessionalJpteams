<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Full Screen Chat</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #e2e8f0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .chat-page {
      min-height: 100vh;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .chat-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .chat-header-left {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      min-width: 0;
    }

    .chat-page-card {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      background: rgba(15, 23, 42, 0.95);
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 1rem;
      box-shadow: 0 20px 80px rgba(0, 0, 0, 0.3);
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      min-height: calc(100vh - 6rem);
    }

    .chat-meta {
      color: #94a3b8;
      font-size: 0.95rem;
    }

    #chatMessages {
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      padding: 1rem;
      background: #020617;
      border-radius: 1rem;
      border: 1px solid #374151;
      margin-bottom: 1rem;
    }

    .chat-message {
      padding: 0.85rem 1rem;
      border-radius: 1rem;
      margin-bottom: 0.75rem;
      background: #111827;
      word-break: break-word;
    }

    .chat-message strong {
      display: block;
      margin-bottom: 0.35rem;
      color: #f8fafc;
    }

    .chat-message-time {
      color: #94a3b8;
      font-size: 0.82rem;
      margin-top: 0.5rem;
    }

    .chat-image {
      display: block;
      max-width: 100%;
      border-radius: 1rem;
      margin-top: 0.75rem;
      cursor: pointer;
      border: 1px solid rgba(148, 163, 184, 0.2);
    }

    #chatError {
      color: #f87171;
      padding: 0.85rem 1rem;
      border: 1px solid rgba(248, 113, 113, 0.4);
      border-radius: 0.75rem;
      background: rgba(220, 38, 38, 0.08);
      margin-bottom: 1rem;
      display: none;
    }

    #chatControls {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      align-items: flex-end;
    }

    #chatMessageInput {
      flex: 1 1 auto;
      min-width: 0;
      padding: 1rem 1.1rem;
      border-radius: 9999px;
      border: 1px solid rgba(148, 163, 184, 0.25);
      background: #0f172a;
      color: #f8fafc;
      outline: none;
      font-size: 1rem;
    }

    #chatMessageForm button {
      min-width: 120px;
      padding: 0.95rem 1.25rem;
      border: none;
      border-radius: 9999px;
      cursor: pointer;
      font-weight: 700;
      color: white;
      background: #10b981;
    }

    #chatImagePreview {
      display: none;
      padding: 0.85rem 1rem;
      border-radius: 1rem;
      background: #111827;
      border: 1px solid #374151;
      margin-bottom: 1rem;
    }

    #chatImagePreview img {
      max-width: 100%;
      border-radius: 1rem;
      display: block;
      margin-bottom: 0.75rem;
    }

    @media (max-width: 900px) {
      .chat-page {
        padding: 1rem;
      }
      .chat-page-card {
        min-height: calc(100vh - 5rem);
        padding: 1rem;
      }
      #chatMessageForm {
        flex-direction: column;
      }
      #chatMessageForm button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="chat-page">
    <div class="chat-header">
      <div class="chat-header-left">
        <button id="backButton" style="background: rgba(59, 130, 246, 0.15); color: #60a5fa; border: 1px solid rgba(96, 165, 250, 0.35); border-radius: 9999px; padding: 0.75rem 1rem; cursor: pointer; width: fit-content;">← Back</button>
        <h1 id="chatTitle" style="margin: 0; font-size: 2rem; color: #f8fafc;">Live Chat</h1>
        <p id="chatMeta" class="chat-meta">Loading chat...</p>
      </div>
      <div style="display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: center;">
        <span id="chatStatus" style="padding: 0.5rem 0.9rem; border-radius: 9999px; background: #1f2937; color: #cbd5e1; font-size: 0.95rem;">Status: Active</span>
      </div>
    </div>

    <div class="chat-page-card">
      <div id="chatError"></div>
      <div id="chatMessages"></div>
      <div id="chatImagePreview"></div>
      <form id="chatMessageForm" autocomplete="off">
        <input id="chatMessageInput" type="text" placeholder="Write a message..." />
        <button type="button" id="attachImageButton">📷</button>
        <button type="submit">Send</button>
        <input id="chatImageInput" type="file" accept="image/*" style="display:none;" />
      </form>
    </div>
  </div>

  <script type="module" src="chat.js"></script>
</body>
</html>
