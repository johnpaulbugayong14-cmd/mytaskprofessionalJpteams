<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Video Conference - My Thesis Hub</title>
  <link rel="manifest" href="manifest.json?v=6">
  <meta name="theme-color" content="#3b82f6">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><path d='M20 50l15 15 45-45' stroke='%233b82f6' stroke-width='8' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }

    .video-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    }

    .video-header {
      background: linear-gradient(135deg, #1e3a8a 0%, #2d5aa8 100%);
      padding: 1.5rem;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .video-header h1 {
      font-size: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .header-controls {
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    .room-info {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(255, 255, 255, 0.1);
      padding: 0.5rem 1rem;
      border-radius: 0.375rem;
      font-size: 0.9rem;
    }

    .room-id {
      font-weight: 600;
      font-family: 'Courier New', monospace;
    }

    .copy-btn {
      background: none;
      border: none;
      color: white;
      cursor: pointer;
      padding: 0.25rem 0.5rem;
      border-radius: 0.25rem;
      transition: background 0.2s;
    }

    .copy-btn:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .back-btn {
      background: rgba(255, 255, 255, 0.2);
      border: none;
      color: white;
      padding: 0.5rem 1rem;
      border-radius: 0.375rem;
      cursor: pointer;
      font-size: 0.9rem;
      transition: background 0.2s;
    }

    .back-btn:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    .video-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .jitsi-container {
      flex: 1;
      position: relative;
    }

    #jitsi-iframe {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 0.5rem;
      margin: 0.5rem;
    }

    .control-panel {
      background: #1e293b;
      padding: 1.5rem;
      border-top: 1px solid #334155;
      display: flex;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .btn {
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 0.375rem;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 500;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn-primary {
      background: #3b82f6;
      color: white;
    }

    .btn-primary:hover {
      background: #2563eb;
      transform: translateY(-2px);
      box-shadow: 0 4px 8px rgba(59, 130, 246, 0.3);
    }

    .btn-secondary {
      background: #475569;
      color: white;
    }

    .btn-secondary:hover {
      background: #334155;
    }

    .btn-danger {
      background: #ef4444;
      color: white;
    }

    .btn-danger:hover {
      background: #dc2626;
    }

    .btn-success {
      background: #22c55e;
      color: white;
    }

    .btn-success:hover {
      background: #16a34a;
    }

    .setup-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      padding: 2rem;
      text-align: center;
    }

    .setup-card {
      background: #1e293b;
      border-radius: 0.75rem;
      padding: 3rem;
      max-width: 500px;
      box-shadow: 0 20px 25px rgba(0, 0, 0, 0.5);
    }

    .setup-card h2 {
      font-size: 2rem;
      margin-bottom: 1.5rem;
      color: #e2e8f0;
    }

    .setup-card p {
      color: #cbd5e1;
      margin-bottom: 2rem;
      line-height: 1.6;
    }

    .input-group {
      margin-bottom: 1.5rem;
      text-align: left;
    }

    .input-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 500;
      color: #cbd5e1;
      font-size: 0.9rem;
    }

    .input-group input {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid #475569;
      border-radius: 0.375rem;
      background: #0f172a;
      color: #e2e8f0;
      font-size: 1rem;
    }

    .input-group input:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    .button-group {
      display: flex;
      gap: 1rem;
      margin-top: 2rem;
      flex-direction: column;
    }

    .button-group .btn {
      width: 100%;
      justify-content: center;
    }

    .divider {
      margin: 1.5rem 0;
      text-align: center;
      color: #64748b;
    }

    .divider::before,
    .divider::after {
      content: '';
      display: inline-block;
      width: 45%;
      height: 1px;
      background: #475569;
      vertical-align: middle;
    }

    .divider::before {
      margin-right: 1rem;
    }

    .divider::after {
      margin-left: 1rem;
    }

    .alert {
      padding: 1rem;
      border-radius: 0.375rem;
      margin-bottom: 1rem;
      display: none;
    }

    .alert.show {
      display: block;
    }

    .alert-success {
      background: #dcfce7;
      color: #166534;
      border-left: 4px solid #22c55e;
    }

    .alert-error {
      background: #fee2e2;
      color: #991b1b;
      border-left: 4px solid #ef4444;
    }

    .status-badge {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
      font-size: 0.8rem;
      font-weight: 600;
      margin-left: 0.5rem;
    }

    .status-badge.active {
      background: #dcfce7;
      color: #166534;
    }

    .status-badge.inactive {
      background: #f3f4f6;
      color: #6b7280;
    }

    .participants-list {
      background: #1e293b;
      padding: 1rem;
      border-radius: 0.375rem;
      margin-top: 1rem;
      max-height: 200px;
      overflow-y: auto;
    }

    .participant-item {
      padding: 0.5rem;
      border-bottom: 1px solid #334155;
      font-size: 0.9rem;
      color: #cbd5e1;
    }

    .participant-item:last-child {
      border-bottom: none;
    }

    .loading-spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(59, 130, 246, 0.3);
      border-top: 3px solid #3b82f6;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    #availableRoomsList {
      scrollbar-width: thin;
      scrollbar-color: #475569 #1e293b;
    }

    #availableRoomsList::-webkit-scrollbar {
      width: 8px;
    }

    #availableRoomsList::-webkit-scrollbar-track {
      background: #1e293b;
    }

    #availableRoomsList::-webkit-scrollbar-thumb {
      background: #475569;
      border-radius: 4px;
    }

    #availableRoomsList::-webkit-scrollbar-thumb:hover {
      background: #64748b;
    }

    @media (max-width: 768px) {
      .video-header {
        flex-direction: column;
        gap: 1rem;
      }

      .header-controls {
        width: 100%;
        justify-content: space-between;
      }

      .setup-card {
        padding: 1.5rem;
        max-width: 90%;
      }

      .setup-card h2 {
        font-size: 1.5rem;
      }

      .control-panel {
        flex-direction: column;
      }

      .button-group {
        flex-direction: row;
      }

      .button-group .btn {
        width: auto;
        flex: 1;
      }
    }
  </style>
</head>
<body>

<div class="video-container">
  <!-- Header -->
  <div class="video-header">
    <h1>
      <i class="fas fa-video"></i> Video Conference
    </h1>
    <div class="header-controls">
      <div class="room-info" id="roomInfo" style="display: none;">
        <i class="fas fa-door-open"></i>
        Room: <span class="room-id" id="displayRoomId"></span>
        <button class="copy-btn" onclick="copyRoomId()" title="Copy room ID">
          <i class="fas fa-copy"></i>
        </button>
      </div>
      <button class="back-btn" onclick="goBack()"><i class="fas fa-arrow-left"></i> Back</button>
    </div>
  </div>

  <!-- Main Content -->
  <div class="video-content">
    <!-- Setup Screen (Initial) -->
    <div class="setup-screen" id="setupScreen">
      <div class="setup-card">
        <div id="setupAlert" class="alert"></div>

        <!-- Admin Section: Create Room -->
        <div id="createRoomSection" style="display: none;">
          <h2><i class="fas fa-video"></i> Host Video Conference</h2>
          <p>Create a new conference room for your team members to join.</p>
          <div class="input-group">
            <label for="userName">Your Name</label>
            <input type="text" id="userName" placeholder="Enter your name" required>
          </div>
          <button class="btn btn-success" onclick="createNewRoom()" style="width: 100%; justify-content: center;">
            <i class="fas fa-plus-circle"></i> Create Conference Room
          </button>
        </div>

        <!-- Member Section: Join Room -->
        <div id="memberSection" style="display: none;">
          <h2><i class="fas fa-video"></i> Join Video Conference</h2>
          <p>Select an active conference to join.</p>
          
          <div style="margin-bottom: 1.5rem; display: flex; gap: 0.75rem;">
            <button class="btn btn-primary" onclick="loadAvailableRooms()" style="flex: 1; justify-content: center;">
              <i class="fas fa-sync-alt"></i> Refresh Rooms
            </button>
          </div>

          <div id="availableRoomsList" style="max-height: 400px; overflow-y: auto;">
            <p style="color: #cbd5e1; text-align: center; padding: 2rem;">Loading conferences...</p>
          </div>
        </div>

        <!-- Fallback for manual join (if needed) -->
        <div id="joinRoomSection" style="display: none;">
          <h3 style="font-size: 1.1rem; margin-bottom: 1rem; color: #e2e8f0;">Join by Room ID</h3>
          <div class="input-group">
            <label for="roomIdInput">Room ID</label>
            <input type="text" id="roomIdInput" placeholder="Enter room ID" required>
          </div>
          <button class="btn btn-primary" onclick="joinExistingRoom()" style="width: 100%; justify-content: center;">
            <i class="fas fa-sign-in-alt"></i> Join Room
          </button>
        </div>
      </div>
    </div>

    <!-- Jitsi Container (Hidden initially) -->
    <div class="jitsi-container" id="jitsiContainer" style="display: none;">
      <div id="jitsi-iframe"></div>
    </div>
  </div>

  <!-- Control Panel (Hidden initially) -->
  <div class="control-panel" id="controlPanel" style="display: none;">
    <button class="btn btn-secondary" onclick="leaveRoom()">
      <i class="fas fa-phone-slash"></i> Leave Conference
    </button>
    <button class="btn btn-secondary" onclick="toggleParticipants()">
      <i class="fas fa-users"></i> Participants (<span id="participantCount">1</span>)
    </button>
    <div id="participantsList" class="participants-list" style="display: none; position: absolute; bottom: 80px; right: 20px; width: 300px; background: #1e293b; border: 1px solid #334155;"></div>
  </div>
</div>

<!-- Jitsi Meet API Script -->
<script src="https://meet.jit.si/external_api.js"></script>

<!-- Firebase and Jitsi Meet Integration Script -->
<script type="module" src="jitsi-meet.js"></script>

</body>
</html>
