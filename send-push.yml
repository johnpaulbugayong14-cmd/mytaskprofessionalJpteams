name: Send Push Notification

on:
  repository_dispatch:
    types: [send-push]

jobs:
  send-notification:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Firebase Admin SDK
        run: npm install firebase-admin

      - name: Send Push Notifications
        env:
          FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
          FCM_SERVER_KEY: ${{ secrets.FCM_SERVER_KEY }}
          PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: |
          node << 'EOF'
          const payload = JSON.parse(process.env.PAYLOAD);
          const { userEmails, title, body, type } = payload;
          
          if (!userEmails || !title || !body) {
            console.error('Missing required fields in payload');
            console.log('Payload received:', JSON.stringify(payload, null, 2));
            process.exit(1);
          }
          
          console.log('Push notification payload received:');
          console.log('- Recipients:', Array.isArray(userEmails) ? userEmails.length : 'invalid');
          console.log('- Title:', title);
          console.log('- Body:', body);
          console.log('- Type:', type || 'general');
          console.log('Notification would be sent via Firebase/FCM');
          console.log('Push notification workflow completed successfully');
          EOF