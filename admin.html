<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Task Management System</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#3b82f6">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>📊 Admin Dashboard</h1>
  
  <div class="card">
    <h2>Create New Task</h2>
    
    <form onsubmit="event.preventDefault(); createTask();">
      <div class="form-row">
        <div class="form-group">
          <label for="title">Task Title</label>
          <input id="title" type="text" placeholder="Enter task title" required>
        </div>
        
        <div class="form-group">
          <label for="deadline">Deadline</label>
          <input id="deadline" type="date" required>
        </div>
      </div>
      
      <div class="form-group">
        <label for="description">Description</label>
        <textarea id="description" placeholder="Enter task description" rows="4"></textarea>
      </div>
      
      <div class="form-row">
        <div class="form-group">
          <label for="assignedTo">Assign To</label>
          <select id="assignedTo" required>
            <option value="">Select a member</option>
          </select>
        </div>
        
        <div class="form-group">
          <label for="linkInput">Link</label>
          <input id="linkInput" type="url" placeholder="https://example.com/resource" autocomplete="off">
          <p style="font-size: 0.85rem; color: #94a3b8; margin-top: 0.25rem;">Optional: add a reference link for this task.</p>
        </div>
      </div>
      
      <button type="submit" class="btn-success">✓ Create Task</button>
    </form>
  </div>
  
  <div class="card">
    <h2>📈 Task Analytics</h2>
    <canvas id="taskChart"></canvas>
  </div>
  
  <div class="card">
    <h2>📋 All Tasks</h2>
    <div id="tasks"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script type="module" src="admin.js"></script>
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
