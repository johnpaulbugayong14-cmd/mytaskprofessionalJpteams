<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Login - mytaskForThesisHub</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#3b82f6">
  <link rel="stylesheet" href="style.css?v=1">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    
    .login-container {
      width: 100%;
      max-width: 420px;
      padding: 1rem;
    }
    
    .login-card {
      position: relative;
      overflow: hidden;
      background: rgba(30, 41, 59, 0.9);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(148, 163, 184, 0.2);
      padding: 2.5rem 2rem;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    .login-card::before {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, transparent 0%, rgba(56, 189, 248, 0.2) 35%, rgba(56, 189, 248, 0.8) 50%, rgba(56, 189, 248, 0.2) 65%, transparent 100%) top/200% 3px no-repeat,
        linear-gradient(90deg, transparent 0%, rgba(56, 189, 248, 0.2) 35%, rgba(56, 189, 248, 0.8) 50%, rgba(56, 189, 248, 0.2) 65%, transparent 100%) bottom/200% 3px no-repeat,
        linear-gradient(180deg, transparent 0%, rgba(56, 189, 248, 0.2) 35%, rgba(56, 189, 248, 0.8) 50%, rgba(56, 189, 248, 0.2) 65%, transparent 100%) left/3px 200% no-repeat,
        linear-gradient(180deg, transparent 0%, rgba(56, 189, 248, 0.2) 35%, rgba(56, 189, 248, 0.8) 50%, rgba(56, 189, 248, 0.2) 65%, transparent 100%) right/3px 200% no-repeat;
      animation: running-lights 3s linear infinite;
      border-radius: inherit;
      box-shadow: inset 0 0 0 1px rgba(56, 189, 248, 0.12);
    }

    .login-card::after {
      content: '';
      position: absolute;
      inset: 8px;
      pointer-events: none;
      border-radius: 14px;
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.08), transparent 40%, rgba(6, 182, 212, 0.08));
      opacity: 0.8;
      filter: blur(8px);
      animation: card-glow 4s ease-in-out infinite alternate;
    }

    @keyframes running-lights {
      0% {
        background-position: -100% top, 100% bottom, left -100%, right 100%;
      }
      50% {
        background-position: 100% top, -100% bottom, left 100%, right -100%;
      }
      100% {
        background-position: -100% top, 100% bottom, left -100%, right 100%;
      }
    }

    @keyframes card-glow {
      0% {
        opacity: 0.6;
        transform: scale(0.998);
      }
      100% {
        opacity: 1;
        transform: scale(1.002);
      }
    }

    .login-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    
    .login-header h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }
    
    .login-header p {
      color: #94a3b8;
      font-size: 0.95rem;
    }
    
    .forgot-password {
      text-align: right;
      margin-top: 0.75rem;
    }
    
    .forgot-password a {
      color: #3b82f6;
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.3s ease;
    }
    
    .forgot-password a:hover {
      color: #60a5fa;
    }
  </style>
</head>
<body>

<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <h1>Welcome Back</h1>
      <p>Sign in to your task management account</p>
    </div>
    
    <form onsubmit="event.preventDefault(); login();">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input id="email" type="email" placeholder="your@email.com" required>
      </div>
      
      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" placeholder="Enter your password" required>
      </div>
      
      <div id="loginMessage" class="alert" style="display:none; margin-bottom: 1rem;"></div>
      
      <button type="submit">Sign In</button>
    </form>
  </div>
</div>

<script type="module" src="auth.js?v=3"></script>
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
