name: Send Task Email Notifications

# Trigger workflow on schedule (every 5 minutes to check for new tasks)
on:
  schedule:
    - cron: '* * * * *'  # Every 1 minute
  workflow_dispatch:  # Allow manual trigger

jobs:
  send-task-emails:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install firebase-admin nodemailer

      - name: Send task notification emails
        uses: actions/github-script@v7
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
        with:
          script: |
            const admin = require('firebase-admin');
            const nodemailer = require('nodemailer');
            
            // Initialize Firebase
            const serviceAccount = {
              type: "service_account",
              project_id: process.env.FIREBASE_PROJECT_ID,
              private_key: process.env.FIREBASE_PRIVATE_KEY.replace(/\\n/g, '\n'),
              client_email: process.env.FIREBASE_CLIENT_EMAIL,
              client_id: process.env.FIREBASE_CLIENT_ID || "",
              auth_uri: "https://accounts.google.com/o/oauth2/auth",
              token_uri: "https://oauth2.googleapis.com/token",
              auth_provider_x509_cert_url: "https://www.googleapis.com/oauth2/v1/certs",
              client_x509_cert_url: process.env.FIREBASE_CERT_URL || ""
            };
            
            admin.initializeApp({
              credential: admin.credential.cert(serviceAccount),
              databaseURL: "https://task-edd4d.firebaseio.com"
            });
            
            const db = admin.firestore();
            
            // Email mapping
            const emailMapping = {
              'johnpaulbugayong@gmail.com': 'johnpaulbugayong14@gmail.com',
              'kingfordnabor@gmail.com': 'kingfordnabor20@gmail.com',
              'allancorral@gmail.com': 'allancorral084@gmail.com',
              'phricksborebor@gmail.com': 'boreborpj16@gmail.com',
              'moezarperez@gmail.com': 'moezarg19@gmail.com',
              'rogelioledda@gmail.com': 'rogelioledda051506@gmail.com'
            };
            
            // Configure email transporter
            const transporter = nodemailer.createTransport({
              service: 'gmail',
              auth: {
                user: process.env.GMAIL_USER,
                pass: process.env.GMAIL_PASSWORD
              }
            });
            
            // Get new tasks that haven't been notified yet
            const tasksSnapshot = await db.collection('tasks')
              .where('emailNotificationSent', '!=', true)
              .get();
            
            console.log(`Found ${tasksSnapshot.size} new tasks to notify`);
            
            for (const taskDoc of tasksSnapshot.docs) {
              const task = taskDoc.data();
              const recipientEmail = emailMapping[task.assignedTo] || task.assignedTo;
              
              if (!recipientEmail) continue;
              
              const htmlContent = `
                <html>
                  <body style="font-family: Arial, sans-serif; line-height: 1.6; color: #333;">
                    <div style="max-width: 600px; margin: 0 auto; padding: 20px; border: 1px solid #ddd; border-radius: 5px; background-color: #f9f9f9;">
                      <div style="background-color: #0ea5e9; color: white; padding: 20px; border-radius: 5px 5px 0 0; text-align: center;">
                        <h2>New Task Assigned</h2>
                      </div>
                      <div style="padding: 20px; background-color: white;">
                        <p>Hello ${task.assignedToName || task.assignedTo},</p>
                        <p>You have been assigned a new task:</p>
                        <div style="background-color: #f0f7ff; border-left: 4px solid #0ea5e9; padding: 15px; margin: 15px 0;">
                          <strong>Task Title:</strong> ${task.title}<br>
                          <strong>Deadline:</strong> ${new Date(task.deadline).toLocaleString()}<br>
                          ${task.description ? `<strong>Description:</strong> ${task.description}<br>` : ''}
                        </div>
                        <p>Please log in to the system to view more details and update the task status.</p>
                        <p>
                          <a href="http://mytaskprofessional-jpteams.vercel.app/?v=2" style="display: inline-block; background-color: #0ea5e9; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px;">View Task</a>
                        </p>
                      </div>
                      <div style="background-color: #f0f0f0; padding: 15px; text-align: center; font-size: 12px; color: #666;">
                        <p>This is an automated email notification. Please do not reply to this email.</p>
                      </div>
                    </div>
                  </body>
                </html>
              `;
              
              try {
                await transporter.sendMail({
                  from: `"My Thesis Hub" <${process.env.GMAIL_USER}>`,
                  to: recipientEmail,
                  subject: `New Task Assigned: ${task.title}`,
                  html: htmlContent
                });
                
                // Mark task as notified
                await db.collection('tasks').doc(taskDoc.id).update({
                  emailNotificationSent: true,
                  emailNotificationSentAt: new Date()
                });
                
                console.log(`✅ Email sent to ${recipientEmail} for task: ${task.title}`);
              } catch (error) {
                console.error(`❌ Failed to send email to ${recipientEmail}:`, error);
              }
            }
