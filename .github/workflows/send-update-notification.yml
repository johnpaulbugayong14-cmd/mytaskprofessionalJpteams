name: Send Update Notification

on:
  schedule:
    # Run every Monday at 9 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch: # Allow manual trigger

jobs:
  send-update-email:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install nodemailer

      - name: Send update notification email
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
        run: |
          node -e "
          const nodemailer = require('nodemailer');
          
          // List of all member emails (you may need to fetch this dynamically or hardcode)
          const memberEmails = [
            'kingfordnabor@gmail.com',
            'allancorral@gmail.com',
            'phricksborebor@gmail.com',
            'moezarperez@gmail.com',
            'rogelioledda@gmail.com'
          ];
          
          const transporter = nodemailer.createTransporter({
            service: 'gmail',
            auth: {
              user: process.env.GMAIL_USER,
              pass: process.env.GMAIL_PASS,
            },
          });
          
          const mailOptions = {
            from: process.env.GMAIL_USER,
            to: memberEmails.join(','),
            subject: 'MyThesisHub App Update Available',
            text: \`Hello Team,

We have exciting new features available in MyThesisHub!

Please update your app to access the latest improvements and ensure you have the best experience.

Update Link: https://drive.google.com/drive/folders/1tUwf_vpw0RWlOWHvZEUIWA6pPlGDohAT?usp=drive_link

If you have any questions, please contact the admin.

— MyThesisHub Automated System Notification\`,
          };
          
          transporter.sendMail(mailOptions, (error, info) => {
            if (error) {
              console.error('Error sending email:', error.message);
              process.exit(1);
            }
            console.log('Update notification email sent successfully:', info.response);
          });
          "