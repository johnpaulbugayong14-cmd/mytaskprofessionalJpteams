name: Send Task Reminders

on:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes
  workflow_dispatch:

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install firebase-admin nodemailer

      - name: Check task deadlines and send reminders
        uses: actions/github-script@v7
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
        with:
          script: |
            const admin = require('firebase-admin');
            const nodemailer = require('nodemailer');
            
            // Initialize Firebase
            const serviceAccount = {
              type: "service_account",
              project_id: process.env.FIREBASE_PROJECT_ID,
              private_key: process.env.FIREBASE_PRIVATE_KEY.replace(/\\n/g, '\n'),
              client_email: process.env.FIREBASE_CLIENT_EMAIL,
              client_id: process.env.FIREBASE_CLIENT_ID || "",
              auth_uri: "https://accounts.google.com/o/oauth2/auth",
              token_uri: "https://oauth2.googleapis.com/token",
              auth_provider_x509_cert_url: "https://www.googleapis.com/oauth2/v1/certs",
              client_x509_cert_url: process.env.FIREBASE_CERT_URL || ""
            };
            
            admin.initializeApp({
              credential: admin.credential.cert(serviceAccount),
              databaseURL: "https://task-edd4d.firebaseio.com"
            });
            
            const db = admin.firestore();
            
            // Email mapping
            const emailMapping = {
              'johnpaulbugayong@gmail.com': 'johnpaulbugayong14@gmail.com',
              'kingfordnabor@gmail.com': 'kingfordnabor20@gmail.com',
              'allancorral@gmail.com': 'allancorral084@gmail.com',
              'phricksborebor@gmail.com': 'boreborpj16@gmail.com',
              'moezarperez@gmail.com': 'moezarg19@gmail.com',
              'rogelioledda@gmail.com': 'rogelioledda051506@gmail.com'
            };
            
            // Configure email transporter
            const transporter = nodemailer.createTransport({
              service: 'gmail',
              auth: {
                user: process.env.GMAIL_USER,
                pass: process.env.GMAIL_PASSWORD
              }
            });
            
            // Get all pending/incomplete tasks
            const tasksSnapshot = await db.collection('tasks')
              .where('status', 'in', ['pending', 'pending validation', 'Not Started'])
              .get();
            
            console.log(`Checking ${tasksSnapshot.size} pending tasks for deadlines`);
            
            const now = new Date();
            
            for (const taskDoc of tasksSnapshot.docs) {
              const task = taskDoc.data();
              const deadline = new Date(task.deadline);
              const timeDiff = deadline - now;
              const daysUntilDue = Math.ceil(timeDiff / (1000 * 3600 * 24));
              
              const recipientEmail = emailMapping[task.assignedTo] || task.assignedTo;
              console.log(`Task check: title=${task.title || 'unknown'} status=${task.status} assignedTo=${task.assignedTo} deadline=${task.deadline} isValidDeadline=${!isNaN(deadline.getTime())} daysUntilDue=${daysUntilDue} recipientEmail=${recipientEmail}`);
              if (!recipientEmail) {
                console.log(`Skipping task ${task.title || taskDoc.id} because no recipient email is available.`);
                continue;
              }
              
              if (isNaN(deadline.getTime())) {
                console.log(`Skipping task ${task.title || taskDoc.id} because deadline is invalid.`);
                continue;
              }
              
              // Check if task is overdue
              if (timeDiff < 0) {
                const daysOverdue = Math.ceil(Math.abs(timeDiff) / (1000 * 3600 * 24));
                
                // Check if we already sent overdue notification for this task today
                const lastOverdueNotification = task.lastOverdueNotificationDate ? new Date(task.lastOverdueNotificationDate) : null;
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                
                if (!lastOverdueNotification || lastOverdueNotification < today) {
                  const htmlContent = `
                    <html>
                      <body style="font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; background-color: #1e3a8a;">
                        <div style="max-width: 600px; margin: 20px auto; background-color: white; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); overflow: hidden;">
                          <div style="background: linear-gradient(135deg, #1e3a8a 0%, #2d5aa8 100%); padding: 30px 20px; text-align: center; color: white;">
                          <div style="display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 10px;">
                            <svg width="40" height="40" viewBox="0 0 100 100" style="background: white; border-radius: 50%;">
                              <circle cx="50" cy="50" r="45" fill="#1e3a8a"/>
                              <path d="M30 50 L45 65 L70 35" stroke="white" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                            <h1 style="margin: 0; font-size: 28px; font-weight: 700;">My Thesis Hub</h1>
                          </div>
                            <p style="margin: 0; font-size: 14px; opacity: 0.9;">Task Management System</p>
                          </div>
                          <div style="background-color: #dc2626; color: white; padding: 15px 20px; text-align: center;">
                            <h2 style="margin: 0; font-size: 20px;">⚠️ Task Overdue</h2>
                          </div>
                          <div style="padding: 30px 20px; color: #333;">
                            <p style="margin: 0 0 15px 0; font-size: 16px;">Hello <strong>${task.assignedToName || task.assignedTo}</strong>,</p>
                            <p style="margin: 0 0 20px 0; font-size: 15px; line-height: 1.6;">The following task is now overdue and requires immediate attention:</p>
                            <div style="background-color: #fff5f5; border-left: 5px solid #dc2626; padding: 15px; margin: 20px 0; border-radius: 5px; color: #333;">
                              <p style="margin: 5px 0;"><strong>Task:</strong> ${task.title}</p>
                              <p style="margin: 5px 0;"><strong>Was Due:</strong> ${deadline.toLocaleString()}</p>
                              <p style="margin: 5px 0;"><strong>Days Overdue:</strong> <span style="color: #dc2626; font-weight: bold;">${daysOverdue}</span></p>
                            </div>
                            <p style="margin: 0 0 20px 0; font-size: 15px; line-height: 1.6;">Please complete this task as soon as possible to maintain project progress.</p>
                            <div style="text-align: center; margin: 25px 0;">
                              <a href="http://mytaskprofessional-jpteams.vercel.app/?v=2" style="display: inline-block; background-color: #1e3a8a; color: white; padding: 12px 30px; text-decoration: none; border-radius: 5px; font-weight: 600; font-size: 15px;">Update Task Status</a>
                            </div>
                          </div>
                          <div style="background-color: #f3f4f6; padding: 15px 20px; text-align: center; border-top: 1px solid #e5e7eb;">
                            <p style="margin: 0; font-size: 12px; color: #6b7280;">This is an automated email notification. Please do not reply to this email.</p>
                            <p style="margin: 5px 0 0 0; font-size: 11px; color: #9ca3af;">© My ThesisHub - Task Management System</p>
                          </div>
                        </div>
                      </body>
                    </html>
                  `;
                  
                  try {
                    await transporter.sendMail({
                      from: `"My Thesis Hub" <${process.env.GMAIL_USER}>`,
                      to: recipientEmail,
                      subject: `⚠️ Task Overdue: ${task.title}`,
                      html: htmlContent
                    });
                    
                    // Update task with last notification date
                    await db.collection('tasks').doc(taskDoc.id).update({
                      lastOverdueNotificationDate: new Date()
                    });
                    
                    console.log(`✅ Overdue reminder sent to ${recipientEmail} for task: ${task.title}`);
                  } catch (error) {
                    console.error(`❌ Failed to send overdue email:`, error);
                  }
                }
              }
              // Check if task is due soon (1-3 days)
              else if (daysUntilDue > 0 && daysUntilDue <= 3) {
                // Check if we already sent due soon notification for this task today
                const lastDueSoonNotification = task.lastDueSoonNotificationDate ? new Date(task.lastDueSoonNotificationDate) : null;
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                
                if (!lastDueSoonNotification || lastDueSoonNotification < today) {
                  const htmlContent = `
                    <html>
                      <body style="font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; background-color: #1e3a8a;">
                        <div style="max-width: 600px; margin: 20px auto; background-color: white; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); overflow: hidden;">
                          <div style="background: linear-gradient(135deg, #1e3a8a 0%, #2d5aa8 100%); padding: 30px 20px; text-align: center; color: white;">
                          <div style="display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 10px;">
                            <svg width="40" height="40" viewBox="0 0 100 100" style="background: white; border-radius: 50%;">
                              <circle cx="50" cy="50" r="45" fill="#1e3a8a"/>
                              <path d="M30 50 L45 65 L70 35" stroke="white" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                            <h1 style="margin: 0; font-size: 28px; font-weight: 700;">My Thesis Hub</h1>
                          </div>
                            <p style="margin: 0; font-size: 14px; opacity: 0.9;">Task Management System</p>
                          </div>
                          <div style="background-color: #f59e0b; color: white; padding: 15px 20px; text-align: center;">
                            <h2 style="margin: 0; font-size: 20px;">⏰ Task Due Soon</h2>
                          </div>
                          <div style="padding: 30px 20px; color: #333;">
                            <p style="margin: 0 0 15px 0; font-size: 16px;">Hello <strong>${task.assignedToName || task.assignedTo}</strong>,</p>
                            <p style="margin: 0 0 20px 0; font-size: 15px; line-height: 1.6;">A task assigned to you is due soon. Please review and complete it before the deadline:</p>
                            <div style="background-color: #fffbeb; border-left: 5px solid #f59e0b; padding: 15px; margin: 20px 0; border-radius: 5px; color: #333;">
                              <p style="margin: 5px 0;"><strong>Task:</strong> ${task.title}</p>
                              <p style="margin: 5px 0;"><strong>Due Date:</strong> ${deadline.toLocaleString()}</p>
                              <p style="margin: 5px 0;"><strong>Time Remaining:</strong> <span style="color: #f59e0b; font-weight: bold;">${daysUntilDue} day(s)</span></p>
                            </div>
                            <p style="margin: 0 0 20px 0; font-size: 15px; line-height: 1.6;">Please make sure to complete this task before the deadline to keep your project on track.</p>
                            <div style="text-align: center; margin: 25px 0;">
                              <a href="http://mytaskprofessional-jpteams.vercel.app/?v=2" style="display: inline-block; background-color: #1e3a8a; color: white; padding: 12px 30px; text-decoration: none; border-radius: 5px; font-weight: 600; font-size: 15px;">View Task Details</a>
                            </div>
                          </div>
                          <div style="background-color: #f3f4f6; padding: 15px 20px; text-align: center; border-top: 1px solid #e5e7eb;">
                            <p style="margin: 0; font-size: 12px; color: #6b7280;">This is an automated email notification. Please do not reply to this email.</p>
                            <p style="margin: 5px 0 0 0; font-size: 11px; color: #9ca3af;">© My ThesisHub - Task Management System</p>
                          </div>
                        </div>
                      </body>
                    </html>
                  `;
                  
                  try {
                    await transporter.sendMail({
                      from: `"My Thesis Hub" <${process.env.GMAIL_USER}>`,
                      to: recipientEmail,
                      subject: `Task Due Soon: ${task.title} (${daysUntilDue} day(s))`,
                      html: htmlContent
                    });
                    
                    // Update task with last notification date
                    await db.collection('tasks').doc(taskDoc.id).update({
                      lastDueSoonNotificationDate: new Date()
                    });
                    
                    console.log(`✅ Due soon reminder sent to ${recipientEmail} for task: ${task.title}`);
                  } catch (error) {
                    console.error(`❌ Failed to send due soon email:`, error);
                  }
                }
              }
            }
