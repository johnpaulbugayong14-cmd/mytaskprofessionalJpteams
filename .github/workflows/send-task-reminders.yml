name: Send Task Reminders

on:
  schedule:
    - cron: '4,9,14,19,24,29,34,39,44,49,54,59 * * * *'
  workflow_dispatch:

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install firebase-admin nodemailer
      - name: Check task deadlines
        uses: actions/github-script@v7
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
        with:
          script: |
            console.log('Starting send-task-reminders workflow...');
            const admin = require('firebase-admin');
            const nodemailer = require('nodemailer');
            console.log('Dependencies loaded');
            const serviceAccount = {
              type: "service_account",
              project_id: process.env.FIREBASE_PROJECT_ID,
              private_key: process.env.FIREBASE_PRIVATE_KEY.replace(/\\n/g, '\n'),
              client_email: process.env.FIREBASE_CLIENT_EMAIL
            };
            admin.initializeApp({
              credential: admin.credential.cert(serviceAccount),
              databaseURL: "https://task-edd4d.firebaseio.com"
            });
            const db = admin.firestore();
            const emailMapping = {
              'johnpaulbugayong@gmail.com': 'johnpaulbugayong14@gmail.com',
              'kingfordnabor@gmail.com': 'kingfordnabor20@gmail.com',
              'allancorral@gmail.com': 'allancorral084@gmail.com',
              'phricksborebor@gmail.com': 'boreborpj16@gmail.com',
              'moezarperez@gmail.com': 'moezarg19@gmail.com',
              'rogelioledda@gmail.com': 'rogelioledda051506@gmail.com'
            };
            const transporter = nodemailer.createTransport({
              service: 'gmail',
              auth: { user: process.env.GMAIL_USER, pass: process.env.GMAIL_PASSWORD }
            });
            const snap = await db.collection('tasks').where('status', 'in', ['pending', 'pending validation', 'Not Started', 'needs action', 'overdue']).get();
            console.log(`Found ${snap.size} incomplete tasks to check`);
            const now = new Date();
            for (const doc of snap.docs) {
              const task = doc.data();
              if (!task.deadline) continue;
              const deadline = new Date(task.deadline);
              if (isNaN(deadline.getTime())) continue;
              
              // Check if reminder was already sent today (limit to 1 per day)
              const lastReminderDate = task.lastReminderSentDate ? new Date(task.lastReminderSentDate) : null;
              const todayStart = new Date(now);
              todayStart.setHours(0, 0, 0, 0);
              if (lastReminderDate && lastReminderDate > todayStart) {
                console.log(`⏭ Skipping ${task.title} - already sent today`);
                continue;
              }
              
              const daysUntil = Math.ceil((deadline - now) / (1000 * 3600 * 24));
              
              // Determine recipients - expand "everyone" to all team members
              let recipients = [];
              if (task.assignedTo === 'everyone') {
                recipients = Object.values(emailMapping);
              } else {
                const email = emailMapping[task.assignedTo] || task.assignedTo;
                if (email) recipients = [email];
              }
              
              // Send to each recipient
              for (const notifEmail of recipients) {
                const html = `<html><body style="font-family: Arial; color: #333;"><div style="background: linear-gradient(135deg, #1e3a8a 0%, #2d5aa8 100%); color: white; padding: 20px; border-radius: 5px;"><h1>My Thesis Hub</h1><h2>Task Reminder</h2></div><div style="padding: 20px;"><p><strong>${task.title}</strong></p><p>Status: ${task.status}</p><p>Due in: ${daysUntil} days</p><a href="http://mytaskprofessional-jpteams.vercel.app/?v=2" style="background-color: #1e3a8a; color: white; padding: 10px 20px; text-decoration: none;">View Task</a></div></body></html>`;
                try {
                  await transporter.sendMail({
                    from: `"My Thesis Hub" <${process.env.GMAIL_USER}>`,
                    to: notifEmail,
                    subject: `Reminder: ${task.title} due in ${daysUntil} days`,
                    html: html
                  });
                  console.log(`✓ Sent reminder to ${notifEmail}`);
                } catch (e) { console.error('Error:', e); }
              }
              
              // Update lastReminderSentDate once per task
              await db.collection('tasks').doc(doc.id).update({
                lastReminderSentDate: new Date()
              });
            }
