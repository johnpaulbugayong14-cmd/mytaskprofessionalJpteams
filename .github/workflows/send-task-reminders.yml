name: Send Task Reminders

on:
  schedule:
    - cron: '4,9,14,19,24,29,34,39,44,49,54,59 * * * *'
  workflow_dispatch:

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm install firebase-admin nodemailer
      - name: Check task deadlines
        uses: actions/github-script@v7
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
        with:
          script: |
            const admin = require('firebase-admin');
            const nodemailer = require('nodemailer');
            const serviceAccount = {
              type: "service_account",
              project_id: process.env.FIREBASE_PROJECT_ID,
              private_key: process.env.FIREBASE_PRIVATE_KEY.replace(/\\n/g, '\n'),
              client_email: process.env.FIREBASE_CLIENT_EMAIL
            };
            admin.initializeApp({
              credential: admin.credential.cert(serviceAccount),
              databaseURL: "https://task-edd4d.firebaseio.com"
            });
            const db = admin.firestore();
            const emailMapping = {
              'johnpaulbugayong@gmail.com': 'johnpaulbugayong14@gmail.com',
              'kingfordnabor@gmail.com': 'kingfordnabor20@gmail.com',
              'allancorral@gmail.com': 'allancorral084@gmail.com',
              'phricksborebor@gmail.com': 'boreborpj16@gmail.com',
              'moezarperez@gmail.com': 'moezarg19@gmail.com',
              'rogelioledda@gmail.com': 'rogelioledda051506@gmail.com'
            };
            const transporter = nodemailer.createTransport({
              service: 'gmail',
              auth: { user: process.env.GMAIL_USER, pass: process.env.GMAIL_PASSWORD }
            });
            const snap = await db.collection('tasks').where('status', 'in', ['pending', 'pending validation', 'Not Started', 'needs action', 'overdue']).get();
            const now = new Date();
            for (const doc of snap.docs) {
              const task = doc.data();
              if (!task.deadline) continue;
              const deadline = new Date(task.deadline);
              if (isNaN(deadline.getTime())) continue;
              const daysUntil = Math.ceil((deadline - now) / (1000 * 3600 * 24));
              const email = emailMapping[task.assignedTo] || task.assignedTo;
              if (!email) continue;
              const html = <html><body style="font-family: Arial; color: #333;"><div style="background: linear-gradient(135deg, #1e3a8a 0%, #2d5aa8 100%); color: white; padding: 20px; border-radius: 5px;"><h1>My Thesis Hub</h1><h2>Task Reminder</h2></div><div style="padding: 20px;"><p><strong></strong></p><p>Status: </p><p>Due in:  days</p><a href="http://mytaskprofessional-jpteams.vercel.app/?v=2" style="background-color: #1e3a8a; color: white; padding: 10px 20px; text-decoration: none;">View Task</a></div></body></html>;
              try {
                await transporter.sendMail({
                  from: "My Thesis Hub" <>,
                  to: email,
                  subject: Reminder:  due in  days,
                  html: html
                });
              } catch (e) { console.error('Error:', e); }
            }
