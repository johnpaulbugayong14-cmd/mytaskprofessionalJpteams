name: Send Email Notification

on:
  repository_dispatch:
    types: [send-email]

jobs:
  send-email:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install nodemailer

      - name: Send email notification
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
        run: |
          node -e "
          const nodemailer = require('nodemailer');
          
          const payload = ${{ toJson(github.event.client_payload) }};
          const { email, name, type, title } = payload;
          
          if (!email || !name || !type || !title) {
            console.error('Missing required fields in payload');
            process.exit(1);
          }
          
          const transporter = nodemailer.createTransport({
            service: 'gmail',
            auth: {
              user: process.env.GMAIL_USER,
              pass: process.env.GMAIL_PASS,
            },
          });
          
          const mailOptions = {
            from: process.env.GMAIL_USER,
            to: email,
            subject: \`New \${type} assigned to you\`,
            text: \`Hello \${name},

You have a new \${type}: \${title}

Please log in to your account to review the details.

— MyThesisHub Automated System Notification\`,
          };
          
          transporter.sendMail(mailOptions, (error, info) => {
            if (error) {
              console.error('Error sending email:', error.message);
              process.exit(1);
            }
            console.log('Email sent successfully:', info.response);
          });
          "
