name: Send Announcement Email Notifications

on:
  schedule:
    - cron: '1,6,11,16,21,26,31,36,41,46,51,56 * * * *'
  workflow_dispatch:

jobs:
  send-announcement-emails:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm install firebase-admin nodemailer
      - name: Send announcement emails
        uses: actions/github-script@v7
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
        with:
          script: |
            const admin = require('firebase-admin');
            const nodemailer = require('nodemailer');
            const serviceAccount = {
              type: "service_account",
              project_id: process.env.FIREBASE_PROJECT_ID,
              private_key: process.env.FIREBASE_PRIVATE_KEY.replace(/\\n/g, '\n'),
              client_email: process.env.FIREBASE_CLIENT_EMAIL
            };
            admin.initializeApp({
              credential: admin.credential.cert(serviceAccount),
              databaseURL: "https://task-edd4d.firebaseio.com"
            });
            const db = admin.firestore();
            const emailMapping = {
              'johnpaulbugayong@gmail.com': 'johnpaulbugayong14@gmail.com',
              'kingfordnabor@gmail.com': 'kingfordnabor20@gmail.com',
              'allancorral@gmail.com': 'allancorral084@gmail.com',
              'phricksborebor@gmail.com': 'boreborpj16@gmail.com',
              'moezarperez@gmail.com': 'moezarg19@gmail.com',
              'rogelioledda@gmail.com': 'rogelioledda051506@gmail.com'
            };
            const transporter = nodemailer.createTransport({
              service: 'gmail',
              auth: { user: process.env.GMAIL_USER, pass: process.env.GMAIL_PASSWORD }
            });
            const snap = await db.collection('announcements').where('emailNotificationSent', '!=', true).get();
            for (const doc of snap.docs) {
              const ann = doc.data();
              for (const email of (ann.assignedTo || [])) {
                const notifEmail = emailMapping[email] || email;
                if (!notifEmail) continue;
                try {
                  await transporter.sendMail({
                    from: `"My Thesis Hub" <${process.env.GMAIL_USER}>`,
                    to: notifEmail,
                    subject: `Announcement: ${ann.title}`,
                    html: `<html><body style="font-family: Arial; color: #333;"><div style="background: linear-gradient(135deg, #1e3a8a 0%, #2d5aa8 100%); color: white; padding: 20px; border-radius: 5px;"><h1>My Thesis Hub</h1><h2>New Announcement</h2></div><div style="padding: 20px;"><p><strong>${ann.title}</strong></p><p>${ann.content}</p><a href="http://mytaskprofessional-jpteams.vercel.app/?v=2" style="background-color: #1e3a8a; color: white; padding: 10px 20px; text-decoration: none;">View</a></div></body></html>`
                  });
                  console.log('Email sent');
                } catch (e) { console.error('Error:', e); }
              }
              await db.collection('announcements').doc(doc.id).update({ emailNotificationSent: true });
            }
