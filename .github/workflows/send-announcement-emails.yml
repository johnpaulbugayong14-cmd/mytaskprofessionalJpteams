name: Send Announcement Email Notifications

on:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes
  workflow_dispatch:

jobs:
  send-announcement-emails:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install firebase-admin nodemailer

      - name: Send announcement notification emails
        uses: actions/github-script@v7
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
        with:
          script: |
            const admin = require('firebase-admin');
            const nodemailer = require('nodemailer');
            
            // Initialize Firebase
            const serviceAccount = {
              type: "service_account",
              project_id: process.env.FIREBASE_PROJECT_ID,
              private_key: process.env.FIREBASE_PRIVATE_KEY.replace(/\\n/g, '\n'),
              client_email: process.env.FIREBASE_CLIENT_EMAIL,
              client_id: process.env.FIREBASE_CLIENT_ID || "",
              auth_uri: "https://accounts.google.com/o/oauth2/auth",
              token_uri: "https://oauth2.googleapis.com/token",
              auth_provider_x509_cert_url: "https://www.googleapis.com/oauth2/v1/certs",
              client_x509_cert_url: process.env.FIREBASE_CERT_URL || ""
            };
            
            admin.initializeApp({
              credential: admin.credential.cert(serviceAccount),
              databaseURL: "https://task-edd4d.firebaseio.com"
            });
            
            const db = admin.firestore();
            
            // Email mapping
            const emailMapping = {
              'johnpaulbugayong@gmail.com': 'johnpaulbugayong14@gmail.com',
              'kingfordnabor@gmail.com': 'kingfordnabor20@gmail.com',
              'allancorral@gmail.com': 'allancorral084@gmail.com',
              'phricksborebor@gmail.com': 'boreborpj16@gmail.com',
              'moezarperez@gmail.com': 'moezarg19@gmail.com',
              'rogelioledda@gmail.com': 'rogelioledda051506@gmail.com'
            };
            
            // Configure email transporter
            const transporter = nodemailer.createTransport({
              service: 'gmail',
              auth: {
                user: process.env.GMAIL_USER,
                pass: process.env.GMAIL_PASSWORD
              }
            });
            
            // Get new announcements that haven't been notified yet
            const announcementsSnapshot = await db.collection('announcements')
              .where('emailNotificationSent', '!=', true)
              .get();
            
            console.log(`Found ${announcementsSnapshot.size} new announcements to notify`);
            
            for (const announcementDoc of announcementsSnapshot.docs) {
              const announcement = announcementDoc.data();
              const recipients = announcement.assignedTo || [];
              
              for (const recipientEmail of recipients) {
                const notificationEmail = emailMapping[recipientEmail] || recipientEmail;
                
                if (!notificationEmail) continue;
                
                const htmlContent = `
                  <html>
                    <body style="font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; background-color: #1e3a8a;">
                      <div style="max-width: 600px; margin: 20px auto; background-color: white; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); overflow: hidden;">
                        <div style="background: linear-gradient(135deg, #1e3a8a 0%, #2d5aa8 100%); padding: 30px 20px; text-align: center; color: white;">
                          <h1 style="margin: 0 0 5px 0; font-size: 28px; font-weight: 700;">📚 My ThesisHub</h1>
                          <p style="margin: 0; font-size: 14px; opacity: 0.9;">Task Management System</p>
                        </div>
                        <div style="background-color: #0ea5e9; color: white; padding: 15px 20px; text-align: center;">
                          <h2 style="margin: 0; font-size: 20px;">📢 New Announcement</h2>
                        </div>
                        <div style="padding: 30px 20px; color: #333;">
                          <p style="margin: 0 0 15px 0; font-size: 16px;">Hello,</p>
                          <p style="margin: 0 0 20px 0; font-size: 15px; line-height: 1.6;">There is a new announcement for you:</p>
                          <div style="background-color: #1e3a8a; border-left: 5px solid #0ea5e9; padding: 15px; margin: 20px 0; border-radius: 5px; color: white;">
                            <p style="margin: 5px 0;"><strong>Title:</strong> ${announcement.title}</p>
                            <p style="margin: 10px 0 5px 0;"><strong>Content:</strong></p>
                            <p style="margin: 5px 0;">${announcement.content}</p>
                          </div>
                          <p style="margin: 0 0 20px 0; font-size: 15px; line-height: 1.6;">Log in to the system to read the full announcement and view any comments from your team members.</p>
                          <div style="text-align: center; margin: 25px 0;">
                            <a href="http://mytaskprofessional-jpteams.vercel.app/?v=2" style="display: inline-block; background-color: #1e3a8a; color: white; padding: 12px 30px; text-decoration: none; border-radius: 5px; font-weight: 600; font-size: 15px;">View Announcement</a>
                          </div>
                        </div>
                        <div style="background-color: #f3f4f6; padding: 15px 20px; text-align: center; border-top: 1px solid #e5e7eb;">
                          <p style="margin: 0; font-size: 12px; color: #6b7280;">This is an automated email notification. Please do not reply to this email.</p>
                          <p style="margin: 5px 0 0 0; font-size: 11px; color: #9ca3af;">© My ThesisHub - Task Management System</p>
                        </div>
                      </div>
                    </body>
                  </html>
                `;
                
                try {
                  await transporter.sendMail({
                    from: `"My Thesis Hub" <${process.env.GMAIL_USER}>`,
                    to: notificationEmail,
                    subject: `New Announcement: ${announcement.title}`,
                    html: htmlContent
                  });
                  
                  console.log(`✅ Email sent to ${notificationEmail} for announcement: ${announcement.title}`);
                } catch (error) {
                  console.error(`❌ Failed to send email to ${notificationEmail}:`, error);
                }
              }
              
              // Mark announcement as notified
              await db.collection('announcements').doc(announcementDoc.id).update({
                emailNotificationSent: true,
                emailNotificationSentAt: new Date()
              });
            }
