name: Send Poll Email Notifications

on:
  schedule:
    - cron: '2,7,12,17,22,27,32,37,42,47,52,57 * * * *'
  workflow_dispatch:

jobs:
  send-poll-emails:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install firebase-admin nodemailer
      - name: Send poll emails
        uses: actions/github-script@v7
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
        with:
          script: |
            console.log('Starting send-poll-emails workflow...');
            const admin = require('firebase-admin');
            const nodemailer = require('nodemailer');
            console.log('Dependencies loaded');
            const serviceAccount = {
              type: "service_account",
              project_id: process.env.FIREBASE_PROJECT_ID,
              private_key: process.env.FIREBASE_PRIVATE_KEY.replace(/\\n/g, '\n'),
              client_email: process.env.FIREBASE_CLIENT_EMAIL
            };
            admin.initializeApp({
              credential: admin.credential.cert(serviceAccount),
              databaseURL: "https://task-edd4d.firebaseio.com"
            });
            const db = admin.firestore();
            const emailMapping = {
              'johnpaulbugayong@gmail.com': 'johnpaulbugayong14@gmail.com',
              'kingfordnabor@gmail.com': 'kingfordnabor20@gmail.com',
              'allancorral@gmail.com': 'allancorral084@gmail.com',
              'phricksborebor@gmail.com': 'boreborpj16@gmail.com',
              'moezarperez@gmail.com': 'moezarg19@gmail.com',
              'rogelioledda@gmail.com': 'rogelioledda051506@gmail.com'
            };
            const transporter = nodemailer.createTransport({
              service: 'gmail',
              auth: { user: process.env.GMAIL_USER, pass: process.env.GMAIL_PASSWORD }
            });
            const snap = await db.collection('polls').where('emailNotificationSent', '!=', true).get();
            console.log(`Found ${snap.size} new polls`);
            for (const doc of snap.docs) {
              const poll = doc.data();
              await db.collection('polls').doc(doc.id).update({ emailNotificationSent: true });
              const recipients = ['johnpaulbugayong@gmail.com', 'kingfordnabor@gmail.com', 'allancorral@gmail.com', 'phricksborebor@gmail.com', 'moezarperez@gmail.com', 'rogelioledda@gmail.com'];
              for (const email of recipients) {
                const notifEmail = emailMapping[email] || email;
                try {
                  await transporter.sendMail({
                    from: `"My Thesis Hub" <${process.env.GMAIL_USER}>`,
                    to: notifEmail,
                    subject: `New Poll`,
                    html: `<html><body style="font-family: Arial, sans-serif; background-color: #f5f5f5; margin: 0; padding: 20px;"><div style="max-width: 600px; margin: 0 auto; background-color: white; border-radius: 5px; overflow: hidden;"><div style="background: linear-gradient(135deg, #1e3a8a 0%, #2d5aa8 100%); color: white; padding: 30px; text-align: center;"><h1 style="margin: 0; font-size: 28px;">My Thesis Hub</h1><p style="margin: 5px 0 0 0; font-size: 14px; opacity: 0.9;">Task Management System</p></div><div style="background-color: #6366f1; color: white; padding: 15px 20px; text-align: center; font-size: 18px; font-weight: bold;">🗳️ New Poll</div><div style="padding: 30px; color: #333;"><p>Hello,</p><p>A new poll has been posted and your vote is needed:</p><div style="background-color: #f0f4ff; border-left: 4px solid #6366f1; padding: 15px; margin: 20px 0;"><p style="margin: 5px 0;"><strong>${poll.question}</strong></p></div><p>Please log in to the app to cast your vote.</p><div style="text-align: center; margin: 30px 0;"><a href="http://mytaskprofessional-jpteams.vercel.app/?v=2" style="background-color: #1e3a8a; color: white; padding: 12px 30px; text-decoration: none; border-radius: 4px; display: inline-block; font-weight: bold;">Vote Now</a></div></div><div style="background-color: #f9f9f9; padding: 20px; text-align: center; font-size: 12px; color: #666; border-top: 1px solid #eee;"><p style="margin: 5px 0;">This is an automated email notification. Please do not reply to this email.</p><p style="margin: 5px 0;">© My Thesis Hub - Task Management System</p></div></div></body></html>`
                  });
                } catch (e) { console.error('Error:', e); }
              }
            }
            for (const doc of snap.docs) {
              await db.collection('polls').doc(doc.id).update({ emailNotificationSent: true });
            }
