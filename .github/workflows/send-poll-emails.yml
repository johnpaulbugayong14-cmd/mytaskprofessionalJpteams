name: Send Poll Email Notifications

on:
  schedule:
    - cron: '2,7,12,17,22,27,32,37,42,47,52,57 * * * *'
  workflow_dispatch:

jobs:
  send-poll-emails:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm install firebase-admin nodemailer
      - name: Send poll emails
        uses: actions/github-script@v7
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
        with:
          script: |
            console.log('Starting send-poll-emails workflow...');
            const admin = require('firebase-admin');
            const nodemailer = require('nodemailer');
            console.log('Dependencies loaded');
            const serviceAccount = {
              type: "service_account",
              project_id: process.env.FIREBASE_PROJECT_ID,
              private_key: process.env.FIREBASE_PRIVATE_KEY.replace(/\\n/g, '\n'),
              client_email: process.env.FIREBASE_CLIENT_EMAIL
            };
            admin.initializeApp({
              credential: admin.credential.cert(serviceAccount),
              databaseURL: "https://task-edd4d.firebaseio.com"
            });
            const db = admin.firestore();
            const emailMapping = {
              'johnpaulbugayong@gmail.com': 'johnpaulbugayong14@gmail.com',
              'kingfordnabor@gmail.com': 'kingfordnabor20@gmail.com',
              'allancorral@gmail.com': 'allancorral084@gmail.com',
              'phricksborebor@gmail.com': 'boreborpj16@gmail.com',
              'moezarperez@gmail.com': 'moezarg19@gmail.com',
              'rogelioledda@gmail.com': 'rogelioledda051506@gmail.com'
            };
            const transporter = nodemailer.createTransport({
              service: 'gmail',
              auth: { user: process.env.GMAIL_USER, pass: process.env.GMAIL_PASSWORD }
            });
            const snap = await db.collection('polls').where('emailNotificationSent', '!=', true).get();
            console.log(`Found ${snap.size} new polls`);
            for (const doc of snap.docs) {
              const poll = doc.data();
              const recipients = ['johnpaulbugayong@gmail.com', 'kingfordnabor@gmail.com', 'allancorral@gmail.com', 'phricksborebor@gmail.com', 'moezarperez@gmail.com', 'rogelioledda@gmail.com'];
              for (const email of recipients) {
                const notifEmail = emailMapping[email] || email;
                try {
                  await transporter.sendMail({
                    from: `"My Thesis Hub" <${process.env.GMAIL_USER}>`,
                    to: notifEmail,
                    subject: `New Poll: ${poll.question}`,
                    html: `<html><body style="font-family: Arial; color: #333;"><div style="background: linear-gradient(135deg, #1e3a8a 0%, #2d5aa8 100%); color: white; padding: 20px; border-radius: 5px;"><h1>My Thesis Hub</h1><h2>New Poll</h2></div><div style="padding: 20px;"><p><strong>${poll.question}</strong></p><a href="http://mytaskprofessional-jpteams.vercel.app/?v=2" style="background-color: #1e3a8a; color: white; padding: 10px 20px; text-decoration: none;">Vote</a></div></body></html>`
                  });
                } catch (e) { console.error('Error:', e); }
              }
            }
            for (const doc of snap.docs) {
              await db.collection('polls').doc(doc.id).update({ emailNotificationSent: true });
            }
