name: Send Meeting Notification

on:
  workflow_dispatch:
  schedule:
    - cron: '3,8,13,18,23,28,33,38,43,48,53,58 * * * *'  # Every 5 minutes, staggered (offset by 3 minutes)

jobs:
  check-and-send-meeting-notifications:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install firebase-admin nodemailer

      - name: Check Firestore and send meeting notifications
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
        run: |
          node <<'SCRIPT'
          const admin = require('firebase-admin');
          const nodemailer = require('nodemailer');

          const firebaseConfig = {
            type: 'service_account',
            project_id: process.env.FIREBASE_PROJECT_ID,
            private_key: process.env.FIREBASE_PRIVATE_KEY.replace(/\\n/g, '\n'),
            client_email: process.env.FIREBASE_CLIENT_EMAIL,
          };

          admin.initializeApp({
            credential: admin.credential.cert(firebaseConfig),
          });

          const db = admin.firestore();
          const transporter = nodemailer.createTransport({
            service: 'gmail',
            auth: {
              user: process.env.GMAIL_USER,
              pass: process.env.GMAIL_PASSWORD,
            },
          });

          async function sendMeetingNotifications() {
            try {
              const today = new Date();
              today.setHours(0, 0, 0, 0);

              const emailMapping = {
                'johnpaulbugayong@gmail.com': 'johnpaulbugayong14@gmail.com',
                'kingfordnabor@gmail.com': 'kingfordnabor20@gmail.com',
                'allancorral@gmail.com': 'allancorral084@gmail.com',
                'phricksborebor@gmail.com': 'boreborpj16@gmail.com',
                'moezarperez@gmail.com': 'moezarg19@gmail.com',
                'rogelioledda@gmail.com': 'rogelioledda051506@gmail.com'
              };

              const meetingsRef = db.collection('meetings');
              const snapshot = await meetingsRef.where('emailNotificationSent', '!=', true).get();

              if (snapshot.empty) {
                console.log('No new meetings to notify');
                return;
              }

              console.log(`Found ${snapshot.size} new meeting(s) to notify`);

              for (const doc of snapshot.docs) {
                const meeting = doc.data();
                const meetingId = doc.id;

                let recipients = [];
                if (meeting.assignedTo === 'everyone') {
                  recipients = Object.values(emailMapping);
                } else if (Array.isArray(meeting.assignedTo)) {
                  recipients = meeting.assignedTo
                    .map(email => emailMapping[email] || email)
                    .filter(email => email);
                } else if (typeof meeting.assignedTo === 'string') {
                  const email = emailMapping[meeting.assignedTo] || meeting.assignedTo;
                  if (email) recipients = [email];
                }

                const meetingTime = meeting.time || 'TBD';
                const meetingDateStr = meeting.date || 'TBD';

                for (const notifEmail of recipients) {
                  try {
                    await transporter.sendMail({
                      from: `"My Thesis Hub" <${process.env.GMAIL_USER}>`,
                      to: notifEmail,
                      subject: `Scheduled Meeting: ${meeting.title}`,
                      html: `<html><body style="font-family: Arial, sans-serif; background-color: #f5f5f5; margin: 0; padding: 20px;"><div style="max-width: 600px; margin: 0 auto; background-color: white; border-radius: 5px; overflow: hidden;"><div style="background: linear-gradient(135deg, #1e3a8a 0%, #2d5aa8 100%); color: white; padding: 30px; text-align: center;"><h1 style="margin: 0; font-size: 28px;">My Thesis Hub</h1><p style="margin: 5px 0 0 0; font-size: 14px; opacity: 0.9;">Meeting Management System</p></div><div style="background-color: #4ade80; color: white; padding: 15px 20px; text-align: center; font-size: 18px; font-weight: bold;">📅 Scheduled Meeting</div><div style="padding: 30px; color: #333;"><p>Hello,</p><p>A new meeting has been scheduled:</p><div style="background-color: #f0fdf4; border-left: 4px solid #4ade80; padding: 15px; margin: 20px 0;"><p style="margin: 5px 0;"><strong>Meeting Title:</strong> ${meeting.title}</p><p style="margin: 5px 0;"><strong>Date:</strong> ${meetingDateStr}</p><p style="margin: 5px 0;"><strong>Time:</strong> ${meetingTime}</p><p style="margin: 5px 0;"><strong>Duration:</strong> ${meeting.duration || 'N/A'} minutes</p><p style="margin: 5px 0;"><strong>Room:</strong> ${meeting.roomName || 'TBD'}</p></div><p>Please log in to the app to join the meeting when it starts.</p><div style="text-align: center; margin: 30px 0;"><a href="http://mytaskprofessional-jpteams.vercel.app/?v=2" style="background-color: #1e3a8a; color: white; padding: 12px 30px; text-decoration: none; border-radius: 4px; display: inline-block; font-weight: bold;">View Meeting</a></div></div><div style="background-color: #f9f9f9; padding: 20px; text-align: center; font-size: 12px; color: #666; border-top: 1px solid #eee;"><p style="margin: 5px 0;">This is an automated email notification. Please do not reply to this email.</p><p style="margin: 5px 0;">© My Thesis Hub - Meeting Management System</p></div></div></body></html>`
                    });
                    console.log(`✓ Meeting notification sent to ${notifEmail}`);
                  } catch (error) {
                    console.error('Failed to send meeting email:', error.message);
                  }
                }

                // Mark as notified
                try {
                  await meetingsRef.doc(meetingId).update({
                    emailNotificationSent: true,
                    last_notified: new Date()
                  });
                  console.log(`Meeting ${meetingId} marked as notified`);
                } catch (error) {
                  console.error('Failed to update meeting notification status:', error.message);
                }
              }

              console.log('Meeting notification check completed');
            } catch (error) {
              console.error('Error in sendMeetingNotifications:', error);
              process.exit(1);
            }
          }

          sendMeetingNotifications().then(() => {
            process.exit(0);
          });
          SCRIPT
