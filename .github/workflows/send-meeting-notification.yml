name: Send Meeting Notification

on:
  repository_dispatch:
    types: [meeting-created]

jobs:
  send-meeting-email:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install nodemailer

      - name: Send meeting notification email
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
        run: |
          node -e "
          const nodemailer = require('nodemailer');
          
          const payload = ${{ toJson(github.event.client_payload) }};
          const { email, name, meetingTitle, meetingDate, meetingTime } = payload;
          
          if (!email || !name || !meetingTitle || !meetingDate || !meetingTime) {
            console.error('Missing required fields in payload');
            process.exit(1);
          }
          
          const transporter = nodemailer.createTransporter({
            service: 'gmail',
            auth: {
              user: process.env.GMAIL_USER,
              pass: process.env.GMAIL_PASS,
            },
          });
          
          const mailOptions = {
            from: process.env.GMAIL_USER,
            to: email,
            subject: \`New Meeting Scheduled: \${meetingTitle}\`,
            text: \`Hello \${name},

A new meeting has been scheduled:

Title: \${meetingTitle}
Date: \${meetingDate}
Time: \${meetingTime}

Please log in to your account to join the meeting.

Additionally, we have new features available! Please update your app to access the latest improvements: https://drive.google.com/drive/folders/1tUwf_vpw0RWlOWHvZEUIWA6pPlGDohAT?usp=drive_link

— MyThesisHub Automated System Notification\`,
          };
          
          transporter.sendMail(mailOptions, (error, info) => {
            if (error) {
              console.error('Error sending email:', error.message);
              process.exit(1);
            }
            console.log('Meeting notification email sent successfully:', info.response);
          });
          "